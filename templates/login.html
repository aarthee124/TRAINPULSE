<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailPulse Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-login">
    <div class="container">
        <div class="page-box">
            <h1>🔐 RailPulse Login</h1>
            <p class="subtitle">Sign in to access live train status and route updates.</p>

            <div class="card card-form">
                <form action="/login" method="post" autocomplete="off">
                    <label>USERNAME</label>
                    <input type="text" name="username" class="input-field" placeholder="Enter username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" required>

                    <label>PASSWORD</label>
                    <input type="password" name="password" class="input-field" placeholder="Enter password" autocomplete="new-password" autocorrect="off" autocapitalize="none" spellcheck="false" required>

                    <button type="submit" class="btn-green">LOGIN</button>
                </form>
                <p class="help-text">Use <strong>admin/admin</strong> or <strong>aarthee/eeswari</strong>.</p>
                {% if error %}
                <p class="error-text">{{ error }}</p>
                {% endif %}
            </div>

            <div class="card">
                <a href="/" class="btn-back">← Back to Search</a>
            </div>
        </div>
    </div>
</body>
</html>
